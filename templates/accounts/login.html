<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR System | Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }

        body {
            background: #050b18;
            overflow: hidden;
        }

        /* Animated background grid */
        .grid-bg {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.07) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(48px); }
        }

        /* Glow orbs */
        .orb {
            position: absolute;
            border-radius: 9999px;
            filter: blur(80px);
            animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-1 { width: 500px; height: 500px; background: rgba(59, 130, 246, 0.25); top: -100px; left: -150px; animation-delay: 0s; }
        .orb-2 { width: 400px; height: 400px; background: rgba(99, 102, 241, 0.2); bottom: -80px; right: -100px; animation-delay: -3s; }
        .orb-3 { width: 250px; height: 250px; background: rgba(14, 165, 233, 0.15); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -6s; }
        
        @keyframes orbFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Card glow effect */
        .login-card {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.25);
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.15), 0 0 0 1px rgba(59, 130, 246, 0.1), inset 0 1px 0 rgba(255,255,255,0.06);
        }

        /* Input glow */
        .input-field {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(59, 130, 246, 0.7);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15), 0 0 20px rgba(59, 130, 246, 0.1);
            background: rgba(59, 130, 246, 0.06);
        }
        .input-field::placeholder { color: rgba(148, 163, 184, 0.6); }

        /* Animated login button */
        .login-btn {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }
        .login-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .login-btn:hover::before { opacity: 1; }
        .login-btn:hover { box-shadow: 0 8px 30px rgba(59, 130, 246, 0.6); transform: translateY(-1px); }
        .login-btn span { position: relative; z-index: 1; }

        /* Logo pulse */
        .logo-ring {
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4), 0 0 20px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 0 12px rgba(59, 130, 246, 0), 0 0 40px rgba(59, 130, 246, 0.4); }
        }

        /* Page fade in */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in-up-2 { animation: fadeInUp 0.7s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .fade-in-up-3 { animation: fadeInUp 0.7s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both; }

        /* Glow text */
        .glow-text {
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.6), 0 0 60px rgba(59, 130, 246, 0.3);
        }

        /* Separator line */
        .glow-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.5), transparent);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative">

    <!-- Background layers -->
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Login Card -->
    <div class="login-card rounded-2xl p-8 w-full max-w-md mx-4 relative z-10 fade-in-up">
        
        <!-- Logo + Heading -->
        <div class="text-center mb-8 fade-in-up-2">
            <div class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-blue-600/20 border border-blue-500/30 logo-ring mb-4">
                <i class="ph ph-buildings text-3xl text-blue-400"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white glow-text tracking-tight">HR System</h1>
            <p class="text-slate-400 text-sm mt-1 font-medium">Sign in to your workspace</p>
        </div>

        <div class="glow-line mb-7"></div>

        <!-- Error Message -->
        {% if form.errors %}
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-xl mb-5 text-sm flex items-center gap-2 fade-in-up-2">
                <i class="ph ph-warning-circle text-lg shrink-0"></i>
                <span>Invalid username or password. Please try again.</span>
            </div>
        {% endif %}

        <!-- Form -->
        <form method="post" class="space-y-5 fade-in-up-3">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Username</label>
                <div class="relative">
                    <i class="ph ph-user absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                    <input 
                        type="text" name="username" id="username" required
                        placeholder="Enter your username"
                        class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium"
                    >
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2">Password</label>
                <div class="relative">
                    <i class="ph ph-lock-simple absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-lg"></i>
                    <input 
                        type="password" name="password" id="password" required
                        placeholder="Enter your password"
                        class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium"
                    >
                </div>
            </div>

            <button type="submit" class="login-btn w-full py-3.5 rounded-xl text-white font-bold text-sm tracking-wide mt-2">
                <span class="flex items-center justify-center gap-2">
                    <i class="ph ph-sign-in text-lg"></i>
                    Sign In to Dashboard
                </span>
            </button>
        </form>

        <div class="glow-line mt-7 mb-5"></div>

        <p class="text-center text-slate-600 text-xs">
            &copy;2026 HR System. All rights reserved.
        </p>
    </div>

</body>
</html>
