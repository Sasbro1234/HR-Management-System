<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-[#050b18] text-white">

    <div class="bg-[#0a1428] p-8 rounded-2xl w-full max-w-md shadow-lg border border-blue-500/20">

        <h2 class="text-2xl font-bold text-center mb-6">Reset Your Password</h2>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label>Email</label>
                <input type="email" name="email" required
                       class="w-full p-2 rounded bg-gray-800 border border-gray-600">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-semibold">
                Send Reset Link
            </button>
        </form>

    </div>

</body>
</html>
